<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Summarizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 720px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #111;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 28px;
            font-size: 15px;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            resize: vertical;
            outline: none;
            font-family: inherit;
        }

        textarea:focus {
            border-color: #555;
        }

        .divider {
            text-align: center;
            color: #aaa;
            margin: 16px 0;
            font-size: 13px;
        }

        .file-label {
            display: block;
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .file-label:hover {
            border-color: #888;
            color: #444;
        }

        input[type="file"] {
            display: none;
        }

        #file-name {
            margin-top: 8px;
            font-size: 13px;
            color: #555;
            text-align: center;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #111;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #333;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        #result {
            margin-top: 28px;
            display: none;
        }

        #result h2 {
            font-size: 17px;
            margin-bottom: 12px;
            color: #111;
        }

        #summary-text {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
        }

        #error-msg {
            color: #c0392b;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Document Summarizer</h1>
        <p class="subtitle">Paste text or upload a PDF and Claude will summarize it for you.</p>

        <textarea id="text-input" placeholder="Paste your text here..."></textarea>

        <div class="divider">— or upload a PDF —</div>

        <label class="file-label" for="file-input">
            Click to choose a PDF file
        </label>
        <input type="file" id="file-input" accept=".pdf">
        <div id="file-name"></div>

        <button id="submit-btn" onclick="summarize()">Summarize</button>

        <div id="error-msg"></div>

        <div id="result">
            <h2>Summary</h2>
            <div id="summary-text"></div>

            <div id="qa-section" style="margin-top: 28px;">
                <h2>Ask a question about this document</h2>
                <input
                    type="text"
                    id="question-input"
                    placeholder="e.g. What are the main topics covered?"
                    style="width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px; font-size:15px; margin-top:10px; outline:none; font-family:inherit;"
                />
                <button id="ask-btn" onclick="askQuestion()" style="margin-top:12px;">Ask</button>

                <div id="answer-section" style="display:none; margin-top:20px;">
                    <h2>Answer</h2>
                    <div id="answer-text" style="background:#f9f9f9; border:1px solid #eee; border-radius:8px; padding:16px; font-size:15px; line-height:1.7; color:#333; white-space:pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Show the file name when a PDF is selected
        document.getElementById("file-input").addEventListener("change", function() {
            const name = this.files[0] ? this.files[0].name : "";
            document.getElementById("file-name").textContent = name;
            if (name) {
                document.getElementById("text-input").value = "";
            }
        });

        async function summarize() {
            const btn = document.getElementById("submit-btn");
            const errorMsg = document.getElementById("error-msg");
            const result = document.getElementById("result");
            const summaryText = document.getElementById("summary-text");
            const fileInput = document.getElementById("file-input");
            const textInput = document.getElementById("text-input").value.trim();

            // Reset UI
            errorMsg.style.display = "none";
            result.style.display = "none";

            // Build the form data to send to Flask
            const formData = new FormData();

            if (fileInput.files[0]) {
                formData.append("file", fileInput.files[0]);
            } else if (textInput) {
                formData.append("text", textInput);
            } else {
                errorMsg.textContent = "Please paste some text or upload a PDF first.";
                errorMsg.style.display = "block";
                return;
            }

            // Disable button while waiting
            btn.disabled = true;
            btn.textContent = "Summarizing...";

            try {
                const response = await fetch("/summarize", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    errorMsg.textContent = data.error;
                    errorMsg.style.display = "block";
                } else {
                    summaryText.textContent = data.summary;
                    summaryText.dataset.fulltext = textInput || "PDF content";
                    result.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "Something went wrong. Make sure Flask is running.";
                errorMsg.style.display = "block";
            }

            // Re-enable button
            btn.disabled = false;
            btn.textContent = "Summarize";
        }
    async function askQuestion() {
    const question = document.getElementById("question-input").value.trim();
    const document_text = document.getElementById("summary-text").dataset.fulltext;
    const answerSection = document.getElementById("answer-section");
    const answerText = document.getElementById("answer-text");
    const btn = document.getElementById("ask-btn");

    if (!question) {
        alert("Please type a question first.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Thinking...";
    answerSection.style.display = "none";

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                document: document_text,
                question: question
            })
        });

        const data = await response.json();
        answerText.textContent = data.answer;
        answerSection.style.display = "block";
    } catch (err) {
        alert("Something went wrong. Make sure Flask is running.");
    }

    btn.disabled = false;
    btn.textContent = "Ask";
}
    </script>
</body>
</html>
